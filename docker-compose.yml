services:
  db:
    image: postgis/postgis:16-3.4
    container_name: pet_sitter_pro_db
    restart: unless-stopped
    env_file: 
      - ./backend/.env 
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: "./backend" 
    container_name: pet_sitter_backend
    ports:
      - "4000:4000"
    volumes:
      - "./backend:/app"
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    command: npm run dev

  phone-app:
    build: 
      context: "./phone_app" 
    container_name: pet_sitter_phone_app
    ports:
      - "8081:8081"
    volumes:
      - "./phone_app:/app"
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    command: sh -c "npm install && npx expo start --web"

volumes:
  pgdata: